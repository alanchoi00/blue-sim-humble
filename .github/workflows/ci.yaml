name: Check Implementation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CLANG_TIDY: true

jobs:
  test-implementation:
    name: Test Implementation
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:
          - IMAGE: humble-ci
            ROS_DISTRO: humble
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log into registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ROS Industrial CI
        uses: ros-industrial/industrial_ci@master
        env:
          DOCKER_IMAGE: ghcr.io/robotic-decision-making-lab/blue:${{ matrix.env.IMAGE }}
          BEFORE_INIT: >-
            sudo sed -i 's|signed-by=/usr/share/keyrings/ros-archive-keyring.gpg||g'
            /etc/apt/sources.list.d/*.list 2>/dev/null || true &&
            sudo sed -i '/^Signed-By/d' /etc/apt/sources.list.d/*.sources 2>/dev/null || true &&
            echo 'Acquire::AllowInsecureRepositories "true";' | sudo tee /etc/apt/apt.conf.d/99-ros-insecure > /dev/null &&
            echo 'APT::Get::AllowUnauthenticated "true";' | sudo tee -a /etc/apt/apt.conf.d/99-ros-insecure > /dev/null
          CXXFLAGS: >-
            -Wall -Wextra -Wpedantic -Wwrite-strings -Wunreachable-code -Wpointer-arith -Wredundant-decls
          CC: ${{ env.CLANG_TIDY && 'clang' }}
          CXX: ${{ env.CLANG_TIDY && 'clang++' }}
