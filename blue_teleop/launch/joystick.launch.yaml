launch:

  - arg:
      name: joy_config
      default: $(find-pkg-share blue_teleop)/config/joy_teleop.yaml

  - node:
      pkg: joy_linux
      exec: joy_linux_node
      output: screen
      param:
        - from: $(var joy_config)

  - node:
      pkg: joy_teleop
      exec: joy_teleop
      output: screen
      param:
        - from: $(var joy_config)
